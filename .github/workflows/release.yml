name: V.O.I.D. Build Factory

on:
  push:
    tags:
      - 'v*' # This triggers the build whenever you create a version tag like v1.0.0

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows.exe

    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Compile V.O.I.D. Core
        run: cargo build --release --manifest-path core/Cargo.toml --target ${{ matrix.target }}

      - name: Package Binary
        run: |
          mkdir -p dist
          cp core/target/${{ matrix.target }}/release/void-core${{ matrix.suffix == 'windows.exe' && '.exe' || '' }} dist/void-core-${{ matrix.suffix }}
        shell: bash

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
